/**/evolo_move_path_action_server:
  ros__parameters:
    frame_id: "evolo/odom"
    timeout: 1200.0

    # Speed
    speed_slow: 4.0
    speed_standard: 5.0
    speed_fast: 6.0

    omega_max: 16.0

    # Pure Pursuit
    ld_base: 7.0    
    ld_gain: 0.2  

    cte_kp: 0.2
    cte_ki: 0.02
    cte_integral_max: 10.0
    heading_kp: 2.0

    # Dubins planner
    min_turning_radius: 7.5
    dubins_step: 0.5
    dubins_mode: "smooth"  # "vwp" or "smooth"

    geofence_timeout: 5.0
