/**:
    ros__parameters:
        mqtt:
            client:
                protocol: 4      # MQTTv311
            connection:
                host: localhost # these are set in the launch file, so we could have args from outside
                port: 1889
                keepalive: 30
            # tls:
            #     tls_insecure:
            #     ca_certs:
            #     certfile:
            #     keyfile:
            #     cert_reqs:
            #     tls_version:
            #     ciphers:
            # account:
            #     username:
            #     password:
            # message:
            #     max_inflight_messages:
            #     max_queued_messages:
            #     message_rery:
            # will:
            #     topic:
            #     payload:
            #     qos:
            #     retain:
            #     properties:
            namespace: "waraps/unit/subsurface/simulation/sam_test"
            # ros namespacing should be done in the launch file
            # each string here will be a topic on both sides, under their respective namespaces
            to_mqtt: 
              [
                # FIXME: the str_json_mqtt_bridge doesn't support empy to_mqtt fields.
                "none",
              ]
            to_ros:
              [
                "sensor/position",
                "sensor/heading",
                "sensor/course",
                "sensor/speed",
                "sensor/roll",
                "sensor/pitch",
              ]

mqtt_to_ros_agent_publisher:
    ros__parameters:
        position_topic: "sensor/position"
        heading_topic: "sensor/heading"
        course_topic: "sensor/course"
        speed_topic: "sensor/speed"
        roll_topic: "sensor/roll"
        pitch_topic: "sensor/pitch"
        transform_timeout_s: 10.0
        prefer_heading: true
        angle_unit: "deg"
